name: Daily URL Indexer

on:
  schedule:
    - cron: '0 13 * * *'   # Every day at 1pm UTC
  workflow_dispatch:        # Manual trigger anytime

jobs:
  run-indexer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth google-api-python-client requests

      - name: Write service account credentials
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT }}' > service_account.json

      - name: Restore URL cache
        uses: actions/cache@v3
        with:
          path: known_urls.json
          key: url-cache-${{ github.run_id }}
          restore-keys: url-cache-

      - name: Run indexer
        run: python indexer.py
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}

      - name: Commit updated cache back to repo
        run: |
          git config user.name "gsc-indexer-bot"
          git config user.email "bot@agilitytech.ai"
          git add known_urls.json || true
          git diff --staged --quiet || git commit -m "chore: update URL cache [skip ci]"
          git push || true
